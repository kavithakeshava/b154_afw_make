name: Run Tests Later

on:
  schedule:
    - cron: '30 5 30 4 *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt

      - run: playwright install chromium --with-deps

      - run: pytest